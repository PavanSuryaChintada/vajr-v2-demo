<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <!-- Diamond outline shape -->
  <g stroke="#C9A84C" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <!-- Diamond gem outline: top flat edge, angled sides, bottom point -->
    <!-- Top edge (girdle) -->
    <polyline points="28,72 72,38 148,38" />
    <!-- Right side of top -->
    <polyline points="148,38 188,72" />
    <!-- Left bottom facet -->
    <line x1="28" y1="72" x2="108" y2="162" />
    <!-- Right bottom facet -->
    <line x1="188" y1="72" x2="108" y2="162" />
    <!-- Bottom centre point -->
    <!-- Inner table line (top) -->
    <line x1="52" y1="72" x2="164" y2="72" />
    <!-- Inner left diagonal -->
    <line x1="52" y1="72" x2="108" y2="138" />
    <!-- Inner right diagonal -->
    <line x1="164" y1="72" x2="108" y2="138" />
  </g>

  <!-- VAJR wordmark — positioned overlapping the diamond -->
  <!-- V -->
  <text x="42" y="128" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="52" font-weight="400" fill="#C9A84C" letter-spacing="-1">V</text>
  <!-- A -->
  <text x="82" y="128" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="52" font-weight="400" fill="#C9A84C" letter-spacing="-1">A</text>
  <!-- J -->
  <text x="120" y="148" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="52" font-weight="400" fill="#C9A84C" letter-spacing="-1">J</text>
  <!-- R -->
  <text x="152" y="128" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="52" font-weight="400" fill="#C9A84C" letter-spacing="-1">R</text>

  <!-- EWELS wordmark -->
  <text x="185" y="160" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="28" font-weight="400" fill="#C9A84C" letter-spacing="3">EWELS</text>
</svg>

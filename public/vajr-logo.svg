<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 132" fill="none">

  <!-- ══ DIAMOND GEM ICON (side-view brilliant cut) ══ -->
  <g transform="translate(10, 10)" stroke="#C9A84C" fill="none">
    <!-- Outer diamond silhouette -->
    <path d="M 36 0 L 72 34 L 36 110 L 0 34 Z"
          stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Girdle equator line -->
    <line x1="0"  y1="34" x2="72" y2="34" stroke-width="0.9" opacity="0.55"/>
    <!-- Upper table (flat top face) -->
    <line x1="16" y1="17" x2="56" y2="17" stroke-width="0.9" opacity="0.55"/>
    <!-- Upper crown facets -->
    <line x1="0"  y1="34" x2="16" y2="17" stroke-width="0.75" opacity="0.42"/>
    <line x1="72" y1="34" x2="56" y2="17" stroke-width="0.75" opacity="0.42"/>
    <line x1="16" y1="17" x2="36" y2="0"  stroke-width="0.75" opacity="0.42"/>
    <line x1="56" y1="17" x2="36" y2="0"  stroke-width="0.75" opacity="0.42"/>
    <!-- Lower pavilion facets -->
    <line x1="16" y1="34" x2="36" y2="110" stroke-width="0.7" opacity="0.28"/>
    <line x1="56" y1="34" x2="36" y2="110" stroke-width="0.7" opacity="0.28"/>
  </g>

  <!-- Thin vertical separator -->
  <line x1="102" y1="20" x2="102" y2="112"
        stroke="#C9A84C" stroke-width="0.5" opacity="0.16"/>

  <!-- ══ VAJR WORDMARK ══ -->
  <text
    x="116" y="76"
    font-family="Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="44"
    font-weight="normal"
    fill="#C9A84C"
    letter-spacing="4">VAJR</text>

  <!-- Thin decorative rule -->
  <line x1="116" y1="85" x2="272" y2="85"
        stroke="#C9A84C" stroke-width="0.55" opacity="0.32"/>

  <!-- JEWELS sub-label -->
  <text
    x="117" y="101"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="10.5"
    font-weight="normal"
    fill="#C9A84C"
    letter-spacing="5.8"
    opacity="0.76">JEWELS</text>

</svg>
